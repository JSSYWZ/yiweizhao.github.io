<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Purchase Annuity (BPA) Market Report 2023-2024</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .author-link {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            transition: opacity 0.3s;
            border-radius: 50%;
            overflow: hidden;
            width: 60px;
            height: 60px;
        }

        .author-link:hover {
            opacity: 0.8;
        }

        .author-photo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #3498db;
            padding-bottom: 10px;
        }

        h2 {
            color: #3498db;
            margin-top: 30px;
        }

        .section {
            margin-bottom: 40px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 5px;
        }

        ul {
            list-style-type: none;
            padding-left: 20px;
        }

        li {
            margin-bottom: 15px;
            position: relative;
        }

        li:before {
            content: "•";
            color: #3498db;
            position: absolute;
            left: -20px;
        }

        a {
            color: #2980b9;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .source-list {
            columns: 2;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container">
        <a href="https://yiweizhao.com" class="author-link">
            <img src="/images/photo.jpg" alt="yiwei" class="author-photo">
        </a>

        <h1>BPA Market News</h1>
<script>
async function loadBulkAnnuityNews() {
    const container = document.getElementById("bulk-annuity-news");

    try {
        const response = await fetch("https://sweet-water-0d39.yiwei-zhao.workers.dev/");
        const data = await response.json();

        if (!data.articles || data.articles.length === 0) {
            container.innerHTML = "<p>No recent updates found.</p>";
            return;
        }

        let html = "<ul>";
        data.articles.forEach(article => {
            html += `
                <li>
                    <a href="${article.url}" target="_blank">${article.title}</a><br>
                    <small>${new Date(article.publishedAt).toLocaleString()}</small>
                </li>
            `;
        });
        html += "</ul>";

        container.innerHTML = html;

    } catch (error) {
        container.innerHTML = "<p>Error loading news.</p>";
        console.error(error);
    }
}

loadBulkAnnuityNews();
</script>
</body>
</html>
